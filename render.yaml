services:
  - type: web
    name: faithforge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Neon connection string here
      - key: OPENAI_API_KEY
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_TENANT_ID
        sync: false
      - key: MS_EMAIL_ADDRESS
        sync: false
      - key: MS_AUTH_MODE
        value: client_credentials
      - key: NOTIFICATION_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # paste your Vercel frontend URL here
      - key: DEBUG
        value: "False"
